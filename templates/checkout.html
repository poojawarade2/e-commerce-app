{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}
{% block content %}
<h1>Checkout</h1>
<div class="checkout">
  <div>
    <h2>Order summary</h2>
    {% for it in items %}
      <p>{{ it.product.name }} x {{ it.quantity }} &mdash; Rs. {{ "%.2f"|format(it.subtotal) }}</p>
    {% endfor %}
    <p><strong>Total: Rs. {{ "%.2f"|format(total) }}</strong></p>
  </div>
  <form method="post">
    <label>Name <input name="name" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Address <textarea name="address" rows="4" required></textarea></label>
    <button type="submit">Place Order</button>
  </form>
</div>
{% endblock %}
